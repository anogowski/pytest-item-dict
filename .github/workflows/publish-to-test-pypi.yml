name: Release, Test, Build, and Publish to PyPI - 🏷️->🧪->📦->🚀->🏛️

on:
  push:
    branches:
      - main

jobs:
  semantic-release:
    name: Semantic release 🏷️
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: 🏷️ Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"

  test:
    name: ${{ matrix.emoji }} Test (Python ${{ matrix.python-version }})
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            toxenv: "py311"
            experimental: false
            emoji: "🧪"
          - python-version: "3.12"
            toxenv: "py312"
            experimental: false
            emoji: "🧪"
          - python-version: "3.13"
            toxenv: "py313"
            experimental: false
            emoji: "🧪"
          - python-version: "3.14"
            toxenv: "py314"
            experimental: false
            emoji: "🧪"
          - python-version: "3.15"
            toxenv: "py315"
            experimental: true
            emoji: "⚗️"
          - python-version: "3.16"
            toxenv: "py316"
            experimental: true
            emoji: "⚗️"

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ needs.semantic-release.outputs.tag }}
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@main
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.experimental }}
      - name: 🔧 Install tox
        run: python -m pip install tox
      - name: ${{ matrix.emoji }} Run tests
        run: tox -e ${{ matrix.toxenv }}

  build:
    name: Build distribution 📦
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ needs.semantic-release.outputs.tag }}
      - name: 🐍 Set up Python
        uses: actions/setup-python@main
        with:
          python-version: "3.x"
      - name: 🔧 Install build
        run: python -m pip install build
      - name: 📦 Build a binary wheel and a source tarball
        run: python3 -m build
      - name: 💾 Store the distribution packages
        uses: actions/upload-artifact@main
        with:
          name: python-package-distributions
          path: dist/

  sign:
    name: Sign distribution 📦 with Sigstore
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: 📥 Download all the dists
        uses: actions/download-artifact@main
        with:
          name: python-package-distributions
          path: dist/
      - name: 🔏 Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@main
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
      - name: 📤 Upload signed packages and signatures
        uses: actions/upload-artifact@main
        with:
          name: python-package-signatures
          path: dist/

  publish-to-testpypi:
    name: Publish 🚀 Python 🐍 distribution 📦 to TestPyPI
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pytest-item-dict
    permissions:
      id-token: write

    steps:
      - name: 📥 Download all the dists
        uses: actions/download-artifact@main
        with:
          name: python-package-distributions
          path: dist/
      - name: 🚀 Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  publish-to-pypi:
    name: Publish 🚀 Python 🐍 distribution 📦 to PyPI
    needs:
      - build
      - publish-to-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pytest-item-dict
    permissions:
      id-token: write

    steps:
      - name: 📥 Download all the dists
        uses: actions/download-artifact@main
        with:
          name: python-package-distributions
          path: dist/
      - name: 🏛️ Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  github-release:
    name: Upload signatures to GitHub Release
    needs:
      - semantic-release
      - sign
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Download signed packages and signatures
        uses: actions/download-artifact@main
        with:
          name: python-package-signatures
          path: dist/
      - name: 🐙 Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload
          '${{ needs.semantic-release.outputs.tag }}' dist/**
          --repo '${{ github.repository }}'